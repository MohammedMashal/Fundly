<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link rel="stylesheet" href="adminDashboard.css" />
    <script type="module" src="adminDashboard.js"></script>
    <title>Admin Dashboard | Fundly</title>
  </head>
  <body>
    <main class="admin-page">
      <aside class="admin-sidebar">
        <header class="sidebar-brand">
          <h1><a class="logo-link" href="../index.html">FundIt</a></h1>
          <span class="dashboard-pill">Dashboard</span>
        </header>

        <nav class="sidebar-nav">
          <a class="sidebar-link active" id="nav-users" href="#users-view">
            <span class="material-symbols-outlined">person</span>
            User Management
          </a>
          <a class="sidebar-link" id="nav-campaigns" href="#campaigns-view">
            <span class="material-symbols-outlined">article</span>
            Campaign Management
          </a>
          <a class="sidebar-link" id="nav-pledges" href="#pledges-view">
            <span class="material-symbols-outlined">paid</span>
            Pledges
          </a>
        </nav>

        <a class="sidebar-logout" href="#" id="logout-btn">
          <span class="material-symbols-outlined">logout</span>
          Logout
        </a>
      </aside>

      <section class="admin-main">
        <header class="admin-topbar">
          <div class="topbar-actions">
            <button type="button" class="avatar">AD</button>
          </div>
        </header>

        <section id="users-view" class="admin-view active-view">
          <h2 class="view-title">User Management</h2>
          <div class="cards-grid users-grid" id="users-grid"></div>
        </section>

        <section id="campaigns-view" class="admin-view">
          <h2 class="view-title">Campaign Management</h2>
          <div class="cards-grid campaigns-grid" id="campaigns-grid"></div>
        </section>

        <section id="pledges-view" class="admin-view">
          <h2 class="view-title">Pledges</h2>
          <div class="cards-grid pledges-grid" id="pledges-grid"></div>
        </section>
      </section>
    </main>

    <dialog id="admin-edit-campaign-dialog" class="admin-edit-dialog">
      <form
        id="admin-edit-campaign-form"
        class="admin-edit-form"
        method="dialog"
      >
        <header class="admin-edit-head">
          <h3>Edit Campaign</h3>
          <button
            type="button"
            id="admin-edit-close-top"
            class="admin-edit-close"
          >
            ×
          </button>
        </header>

        <input id="admin-edit-id" type="hidden" />

        <div class="field">
          <label for="admin-edit-title">Title</label>
          <input id="admin-edit-title" type="text" required />
        </div>

        <div class="field">
          <label for="admin-edit-category">Category</label>
          <select id="admin-edit-category" required>
            <option value="Technology">Technology</option>
            <option value="Art">Art</option>
            <option value="Games">Games</option>
            <option value="Design">Design</option>
            <option value="Food">Food</option>
            <option value="Fashion">Fashion</option>
            <option value="Music">Music</option>
            <option value="Film">Film</option>
          </select>
        </div>

        <div class="field">
          <label for="admin-edit-description">Description</label>
          <textarea id="admin-edit-description" rows="4" required></textarea>
        </div>

        <div class="admin-edit-grid">
          <div class="field">
            <label for="admin-edit-goal">Goal</label>
            <input id="admin-edit-goal" type="number" min="1" required />
          </div>
          <div class="field">
            <label for="admin-edit-deadline">Deadline</label>
            <input id="admin-edit-deadline" type="date" required />
          </div>
        </div>

        <p id="admin-edit-message" class="admin-edit-message"></p>

        <footer class="admin-edit-actions">
          <button
            type="button"
            id="admin-edit-cancel"
            class="btn btn-secondary"
          >
            Cancel
          </button>
          <button type="submit" id="admin-edit-save" class="btn">
            Save Changes
          </button>
        </footer>
      </form>
    </dialog>

    <dialog id="admin-delete-campaign-dialog" class="admin-delete-dialog">
      <form
        id="admin-delete-campaign-form"
        class="admin-delete-form"
        method="dialog"
      >
        <header class="admin-edit-head">
          <h3>Delete Campaign</h3>
          <button
            type="button"
            id="admin-delete-close-top"
            class="admin-edit-close"
          >
            ×
          </button>
        </header>

        <p class="admin-delete-text">
          Are you sure you want to delete
          <strong id="admin-delete-campaign-title">this campaign</strong>? This
          action cannot be undone.
        </p>

        <footer class="admin-edit-actions">
          <button
            type="button"
            id="admin-delete-cancel"
            class="btn btn-secondary"
          >
            Cancel
          </button>
          <button
            type="submit"
            id="admin-delete-confirm"
            class="btn btn-danger-solid"
          >
            Delete Campaign
          </button>
        </footer>
      </form>
    </dialog>
  </body>
</html>
